# Cascade — TLS reverse proxy for the single-box backend (Nginx alternative).
#
# Caddy (deploy-box/Caddyfile) is simpler — it does TLS automatically. Use this
# if you already run Nginx. You must obtain certs yourself, e.g.:
#   certbot --nginx -d cascade.api.example.com -d constraint.api.example.com \
#           -d learn.api.example.com -d refactor.api.example.com \
#           -d auth.api.example.com -d arena.api.example.com
#
# Subdomain-per-engine (avoids /archetypes and /health path collisions). Replace
# api.example.com with your domain. Point each *_ENGINE_URL on Vercel at the
# matching https subdomain; NEXT_PUBLIC_ARENA_WS_URL = wss://arena.api.example.com/arena/queue.

# WebSocket upgrade map (shared by the arena server block).
map $http_upgrade $connection_upgrade {
	default upgrade;
	''      close;
}

# ---- shared proxy headers ----------------------------------------------------
# (included per location below)

# Redirect all HTTP -> HTTPS for every subdomain.
server {
	listen 80;
	server_name cascade.api.example.com constraint.api.example.com
	            learn.api.example.com refactor.api.example.com
	            auth.api.example.com arena.api.example.com;
	# Let certbot serve the ACME challenge, redirect everything else.
	location /.well-known/acme-challenge/ { root /var/www/certbot; }
	location / { return 301 https://$host$request_uri; }
}

# ---- engines (one server block each) ----------------------------------------
server {
	listen 443 ssl http2;
	server_name cascade.api.example.com;
	ssl_certificate     /etc/letsencrypt/live/cascade.api.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/cascade.api.example.com/privkey.pem;
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
	add_header X-Content-Type-Options nosniff always;
	location / {
		proxy_pass http://127.0.0.1:8090;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}

server {
	listen 443 ssl http2;
	server_name constraint.api.example.com;
	ssl_certificate     /etc/letsencrypt/live/constraint.api.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/constraint.api.example.com/privkey.pem;
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
	location / {
		proxy_pass http://127.0.0.1:8094;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}

server {
	listen 443 ssl http2;
	server_name learn.api.example.com;
	ssl_certificate     /etc/letsencrypt/live/learn.api.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/learn.api.example.com/privkey.pem;
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
	location / {
		proxy_pass http://127.0.0.1:8093;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}

server {
	listen 443 ssl http2;
	server_name refactor.api.example.com;
	ssl_certificate     /etc/letsencrypt/live/refactor.api.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/refactor.api.example.com/privkey.pem;
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
	location / {
		proxy_pass http://127.0.0.1:8095;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}

server {
	listen 443 ssl http2;
	server_name auth.api.example.com;
	ssl_certificate     /etc/letsencrypt/live/auth.api.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/auth.api.example.com/privkey.pem;
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
	location / {
		proxy_pass http://127.0.0.1:8081;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}

# Arena — HTTP + WebSocket (the browser connects directly to wss://.../arena/queue).
server {
	listen 443 ssl http2;
	server_name arena.api.example.com;
	ssl_certificate     /etc/letsencrypt/live/arena.api.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/arena.api.example.com/privkey.pem;
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
	location / {
		proxy_pass http://127.0.0.1:8096;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;   # enables WebSocket
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_read_timeout 3600s;   # keep long-lived duel sockets alive
	}
}
