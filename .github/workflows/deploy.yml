name: Deploy

# Build & publish backend container images to GitHub Container Registry (GHCR).
# Free, no cloud account required — works for the bootstrap (single-box / PaaS)
# phase. A VPS or Railway/Render can pull these tagged images directly.
#
# The legacy AWS ECS / k8s rollout lives in deploy-aws.yml.disabled and is only
# relevant once the product outgrows a single box (see docs/deployment-strategy.md).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # Reuse the real CI as the gate. (CI runs on push to main already; this keeps
  # the dependency explicit so images are only built from green commits.)
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: [ci]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - cascade-engine
          - constraint-engine
          - learn-engine
          - insight-engine
          - arena-engine
          - refactor-engine
          - auth
          - user
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          # Dockerfiles expect the repo root as build context (they COPY content/).
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
