name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-engines:
    name: Go engines (cascade, constraint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build & test cascade-engine
        working-directory: services/cascade-engine
        run: |
          go build ./...
          go test ./...
      - name: Build & test constraint-engine
        working-directory: services/constraint-engine
        env:
          CONTENT_DIR: ${{ github.workspace }}/content
        run: |
          go build ./...
          go test ./...

  python-services:
    name: Python services (lint + tests)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - learn-engine
          - arena-engine
          - refactor-engine
          - insight-engine
          - auth
          - user
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: services/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ruff pytest
      - name: Lint (ruff, non-blocking)
        working-directory: services/${{ matrix.service }}
        run: ruff check . || true
      - name: Tests (if any)
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -d tests ]; then python -m pytest -q; else echo "no tests"; fi

  dag-validation:
    name: Validate failure DAGs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python scripts/validate-dags.py

  frontend:
    name: Frontend (build + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install & build
        working-directory: frontend
        run: |
          npm install --no-audit --no-fund
          npm run build
