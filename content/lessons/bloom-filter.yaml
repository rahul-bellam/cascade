slug: bloom-filter
title: "Bloom Filter"
prerequisites: []
estimated_minutes: 15
order_index: 4
toolkit_key: bloom_filter

concept:
  - type: text
    body: >
      A Bloom filter is a tiny, probabilistic set. It answers "have I seen this?"
      with either "definitely no" or "maybe yes" — never a false negative, but
      sometimes a false positive. It uses a bit array and k hash functions: to add
      an item, set k bits; to check, test those k bits.
  - type: text
    body: >
      For a URL shortener it pre-filters lookups so the expensive store is only
      hit for codes that might exist — cutting load dramatically and cheaply.
  - type: code_block
    language: python
    code: |
      # add: set bits at k hashed positions. check: all those bits set?
      for i in range(k):
          bits[(hash_fn(item, i)) % m] = 1

snippet:
  prompt: |
    Implement a BloomFilter class:
      __init__(self, size, k)        # bit-array length, number of hashes
      add(self, item)                # set k bits for item
      __contains__(self, item)->bool # True if all k bits are set
    Use the provided `bloom_hash(item, seed)` (stable int) for hashing; index the
    bit array with bloom_hash(item, i) % size for i in range(k).
    The guarantee: an added item must always test True (no false negatives).
