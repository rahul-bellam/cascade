  test_cases:
    - name: "Added items are always present (no false negatives)"
      setup: "b = BloomFilter(2048, 4)\nfor x in ['abc','def','ghi']: b.add(x)"
      call: "all(x in b for x in ['abc','def','ghi'])"
      expected: "True"
    - name: "An item never added is (probably) absent"
      setup: "b = BloomFilter(4096, 4); b.add('seen')"
      call: "'definitely-never-added-zzz' in b"
      expected: "False"
    - name: "Empty filter contains nothing"
      setup: "b = BloomFilter(1024, 3)"
      call: "'anything' in b"
      expected: "False"
  hints:
    - level: 1
      cost: 10
      text: "Store a list of `size` zero bits; pick k positions per item with bloom_hash(item, i) % size."
    - level: 2
      cost: 25
      text: "add() sets those k positions to 1; __contains__ returns True only if ALL k are 1."
    - level: 3
      cost: 50
      text: "for i in range(self.k): idx = bloom_hash(item, i) % self.size — set or test bits[idx]."
