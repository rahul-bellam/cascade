slug: token-bucket
title: "Token Bucket Rate Limiter"
prerequisites: [caching-redis]
estimated_minutes: 15
order_index: 2
toolkit_key: token_bucket

concept:
  - type: text
    body: >
      A rate limiter decides whether a client is allowed to make a request right
      now. The token bucket algorithm models a bucket that holds up to `capacity`
      tokens and refills at a steady `refill_rate` tokens per second. Each request
      costs one token. If a token is available, the request is allowed and a token
      is removed; otherwise it is rejected.
  - type: text
    body: >
      Token bucket is popular because it allows short bursts (up to the bucket
      capacity) while still enforcing a long-run average rate. This is the exact
      mechanic you'll later have to make persistent, atomic, and distributed in
      the Cascade rate-limiter chain.
  - type: code_block
    language: python
    code: |
      # Conceptually: refill based on elapsed time, then try to spend a token.
      tokens = min(capacity, tokens + elapsed * refill_rate)
      if tokens >= 1:
          tokens -= 1
          allow = True
      else:
          allow = False

snippet:
  prompt: |
    Implement a TokenBucket class with:
      __init__(self, capacity, refill_rate)  # tokens, tokens-per-second
      allow(self)  -> bool                   # consume one token if available
    The bucket starts full. For deterministic tests, refill is driven by an
    injectable clock: a module-level `now()` returns the current time in seconds.
    Use now() (already provided in scope) instead of time.time() directly.
