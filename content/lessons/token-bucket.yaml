            pass

        def allow(self):
            # Your code here
            pass
  test_cases:
    - name: "Allows up to capacity immediately (burst)"
      setup: "set_time(0); b = TokenBucket(3, 1)"
      call: "[b.allow(), b.allow(), b.allow(), b.allow()]"
      expected: "[True, True, True, False]"
    - name: "Refills over time"
      setup: "set_time(0); b = TokenBucket(1, 1); b.allow(); set_time(1)"
      call: "b.allow()"
      expected: "True"
    - name: "Does not exceed capacity when idle"
      setup: "set_time(0); b = TokenBucket(2, 1); set_time(100)"
      call: "[b.allow(), b.allow(), b.allow()]"
      expected: "[True, True, False]"
  hints:
    - level: 1
      cost: 10
      text: "Track the current token count and the timestamp of the last refill."
    - level: 2
      cost: 25
      text: "On each allow(), add (now() - last) * refill_rate tokens, capped at capacity."
    - level: 3
      cost: 50
      text: "If tokens >= 1, subtract 1 and return True; else return False. Update last = now()."
