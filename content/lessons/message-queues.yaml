slug: message-queues
title: "Message Queue (basic)"
prerequisites: []
estimated_minutes: 15
order_index: 5
toolkit_key: message_queue

concept:
  - type: text
    body: >
      A message queue decouples producers from consumers. Producers enqueue work
      and return immediately; consumers process at their own pace. This gets slow
      work (sending email, transcoding) off the request path and absorbs spikes.
  - type: text
    body: >
      The core contract: publish(msg) appends to a topic; subscribe()/consume()
      pulls the next message in FIFO order. Real brokers add durability, acks, and
      partitions — but the mental model starts here.
  - type: code_block
    language: python
    code: |
      queue = []
      def publish(msg): queue.append(msg)
      def consume():    return queue.pop(0) if queue else None

snippet:
  prompt: |
    Implement a Queue class with FIFO semantics:
      publish(self, msg)        # enqueue
      consume(self) -> msg|None # dequeue oldest, or None if empty
      size(self) -> int         # number of pending messages
    Messages must come out in the order they went in.
