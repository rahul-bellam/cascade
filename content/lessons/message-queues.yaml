  test_cases:
    - name: "FIFO order"
      setup: "q = Queue()\nfor m in ['a','b','c']: q.publish(m)"
      call: "[q.consume(), q.consume(), q.consume()]"
      expected: "['a', 'b', 'c']"
    - name: "Empty queue returns None"
      setup: "q = Queue()"
      call: "q.consume()"
      expected: "None"
    - name: "size reflects pending work"
      setup: "q = Queue()\nq.publish(1); q.publish(2); q.consume()"
      call: "q.size()"
      expected: "1"
  hints:
    - level: 1
      cost: 10
      text: "A list works: append on publish."
    - level: 2
      cost: 25
      text: "consume() should remove and return the OLDEST item (index 0), not the newest."
    - level: 3
      cost: 50
      text: "Guard consume() against an empty queue — return None instead of raising."
