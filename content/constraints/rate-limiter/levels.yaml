archetype: rate_limiter
name: "Rate Limiter"
slug: rate-limiter
starting_monolith: "Single Flask server, in-memory token bucket, ~10 req/s. Works, but wrong for production."
origin_code: rate-limiter/origin.py

# A fix passes a level when its code/architecture introduces the required
# capability (matched by keywords, like the Cascade fix analyzer) AND the
# simulated metrics meet the level's SLA.
constraints:
  - level: 1
    title: "10x users — server restart wipes all counters"
    impact: "Deploys and crashes reset every client's limit. Attackers force restarts for unlimited access."
    target_rps: 100
    latency_sla_ms: 200
    error_sla_pct: 1.0
    change_type: caching
    requires: [redis, persist]      # keywords the fix must contain
    hints:
      - "What metric breaks after a restart? (correctness — limits reset)"
      - "What component survives a restart? (an external store)"
      - "Move counters to Redis with EXPIRE. See your Toolkit for cache_with_redis / token_bucket."

  - level: 2
    title: "100x users — concurrent requests race on the counter"
    impact: "Two requests read the same count and both pass. ~25% of traffic bypasses the limit under load."
    target_rps: 1000
    latency_sla_ms: 300
    error_sla_pct: 2.0
    change_type: atomic_operation
    requires_any: [lua, incr, atomic]
    requires: [redis]
    hints:
      - "Which metric is wrong now? (limit accuracy under concurrency)"
      - "The read-modify-write must be a single step."
      - "Use INCR or a Lua script so check-and-increment is atomic."

  - level: 3
    title: "1000x users — single node saturated"
    impact: "One server at 100% CPU. Throughput flatlines at ~2k req/s; everything above 503s."
    target_rps: 10000
    latency_sla_ms: 500
    error_sla_pct: 3.0
    change_type: horizontal_scaling
    requires_any: [lb, "load balancer", "scale out", horizontal, shard, "consistent hash"]
    hints:
      - "Which metric is pinned? (CPU / throughput ceiling)"
      - "You can't scale up forever — scale out."
      - "Add a load balancer and shard counters with consistent hashing."
