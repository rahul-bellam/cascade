apiVersion: apps/v1
kind: Deployment
metadata:
  name: cascade-engine
  labels: { app: cascade-engine, tier: backend }
spec:
  replicas: 3
  selector: { matchLabels: { app: cascade-engine } }
  template:
    metadata: { labels: { app: cascade-engine } }
    spec:
      containers:
        - name: cascade-engine
          image: cascade/cascade-engine:latest
          ports: [{ containerPort: 8090 }]
          env:
            - name: INSIGHT_ENGINE_URL
              value: "http://insight-engine:8097"
          readinessProbe:
            httpGet: { path: /health, port: 8090 }
            initialDelaySeconds: 5
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata: { name: cascade-engine }
spec:
  selector: { app: cascade-engine }
  ports: [{ port: 8090, targetPort: 8090 }]
