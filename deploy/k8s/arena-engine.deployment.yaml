apiVersion: apps/v1
kind: Deployment
metadata:
  name: arena-engine
  labels: { app: arena-engine, tier: backend }
spec:
  replicas: 2
  selector: { matchLabels: { app: arena-engine } }
  template:
    metadata: { labels: { app: arena-engine } }
    spec:
      containers:
        - name: arena-engine
          image: cascade/arena-engine:latest
          ports: [{ containerPort: 8096 }]
          readinessProbe:
            httpGet: { path: /health, port: 8096 }
            initialDelaySeconds: 5
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata: { name: arena-engine }
spec:
  # WebSocket duels — sticky sessions recommended at the ingress layer
  selector: { app: arena-engine }
  ports: [{ port: 8096, targetPort: 8096 }]
