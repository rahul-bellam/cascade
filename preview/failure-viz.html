<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cascade — failure visualizations</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Jost:wght@300;400;500&display=swap');
:root{--bg:#FAF7F2;--surface:#FFFDFA;--surface-2:#F4F0E9;--border:#E6E0D6;--fg:#1C1917;--muted:#78716C}
*{box-sizing:border-box;margin:0}body{background:var(--bg);color:var(--fg);font-family:Jost,sans-serif;padding:32px}
h1{font-family:Fraunces,serif;font-weight:600;font-size:28px;margin-bottom:6px}
.sub{color:var(--muted);margin-bottom:28px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px}
.card{border:1px solid var(--border);background:var(--surface);border-radius:16px;padding:16px;box-shadow:0 1px 2px rgba(28,25,23,.04),0 4px 16px rgba(28,25,23,.05)}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cat{font-family:Fraunces,serif;font-size:15px;font-weight:600}
.tag{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}
.state{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:#a8443a}
.blip{width:8px;height:8px;border-radius:50%;background:#a8443a;position:relative}
.blip::after{content:'';position:absolute;inset:0;border-radius:50%;background:#a8443a;animation:ping 1.4s infinite}
@keyframes ping{0%{transform:scale(1);opacity:.6}80%,100%{transform:scale(2.4);opacity:0}}
.desc{font-size:12px;color:var(--muted);margin:8px 0}
.bar{height:8px;border-radius:999px;background:var(--surface-2);overflow:hidden;margin-top:10px}
.fill{height:100%;background:#a8443a;border-radius:999px}
svg{width:100%;height:130px;border:1px solid var(--border);border-radius:10px;background:var(--surface-2)}
.note{margin-top:24px;color:var(--muted);font-size:13px}
</style></head><body>
<h1>Failure, made visible</h1>
<div class="sub">Each cascade node plays out its failure live. A few examples (these animate):</div>
<div class="grid" id="g"></div>
<p class="note">In the app, the red gauge spikes while the issue is live, then flashes <b>green “recovering”</b> for a beat the moment you apply a good fix — before the next failure animates in.</p>
<script>
const cards = [
 {cat:'Availability', tag:'redis_spof', desc:'Redis crashes — 50k requests bypass the limiter.', kind:'avail'},
 {cat:'Resource exhaustion', tag:'memory', desc:'2M keys → 6GB > 4GB maxmem. Evictions.', kind:'mem'},
 {cat:'Scalability', tag:'single_node', desc:'CPU pinned at 100%. Throughput flatlines.', kind:'cpu'},
 {cat:'Consistency', tag:'multi_region', desc:'User shifts region → counter resets → 190 allowed.', kind:'cons'},
 {cat:'Data loss', tag:'no_persistence', desc:'Server restart → counters drain away.', kind:'drain'},
 {cat:'Cost', tag:'cost', desc:'12-node cluster = $4.3k/mo.', kind:'cost'},
];
const D='#a8443a', OK='#3d7d6c', B='#E6E0D6', F='#1C1917', M='#78716C';
function scene(k){
 if(k==='avail') return `<rect x="150" y="39" width="86" height="52" rx="8" fill="#F4F0E9" stroke="${D}" stroke-width="2"><animate attributeName="opacity" values="1;.35;1" dur=".9s" repeatCount="indefinite"/></rect><text x="193" y="69" text-anchor="middle" font-size="11" fill="${F}">service</text>${[0,1,2,3,4].map(i=>`<circle r="3.5" cy="65" fill="${D}"><animate attributeName="cx" from="8" to="300" dur="${1.1+i*.18}s" repeatCount="indefinite"/></circle>`).join('')}<text x="300" y="51" text-anchor="middle" font-size="9" fill="${D}">bypass →</text>`;
 if(k==='mem') return `<rect x="20" y="20" width="110" height="90" rx="6" fill="none" stroke="${B}"/><rect x="20" width="110" rx="6" fill="${D}" opacity=".7" y="26" height="84"><animate attributeName="height" values="40;88;72;90" dur="1.6s" repeatCount="indefinite"/></rect><line x1="20" y1="44" x2="130" y2="44" stroke="${D}" stroke-dasharray="4 3"/><text x="134" y="47" font-size="8" fill="${D}">maxmem</text>`;
 if(k==='cpu') return `<rect x="150" y="39" width="86" height="52" rx="8" fill="#F4F0E9" stroke="${D}" stroke-width="2"/><rect x="250" y="24" width="90" height="14" rx="3" fill="none" stroke="${B}"/><rect x="250" y="24" height="14" rx="3" fill="${D}" width="90"><animate attributeName="width" values="86;90;88;90" dur=".8s" repeatCount="indefinite"/></rect><text x="250" y="52" font-size="8" fill="${M}">CPU 100%</text>`;
 if(k==='cons') return `<rect x="40" y="30" width="70" height="40" rx="6" fill="#F4F0E9" stroke="${D}"/><rect x="250" y="60" width="70" height="40" rx="6" fill="#F4F0E9" stroke="${D}"/><text x="75" y="54" text-anchor="middle" font-size="10" fill="${F}">100</text><text x="285" y="84" text-anchor="middle" font-size="10" fill="${D}">190</text><line x1="110" y1="50" x2="250" y2="80" stroke="${D}" stroke-dasharray="5 4"/><text x="180" y="58" text-anchor="middle" font-size="8" fill="${D}">drift</text>`;
 if(k==='drain') return `<rect x="150" y="39" width="86" height="52" rx="8" fill="#F4F0E9" stroke="${D}" stroke-width="2"/><text x="193" y="69" text-anchor="middle" font-size="11" fill="${F}">counter</text>${[0,1,2].map(i=>`<text x="193" font-size="13" fill="${D}" text-anchor="middle" y="40">↓<animate attributeName="y" from="40" to="120" dur="${1+i*.3}s" repeatCount="indefinite"/><animate attributeName="opacity" from="1" to="0" dur="${1+i*.3}s" repeatCount="indefinite"/></text>`).join('')}`;
 if(k==='cost') return `<rect x="150" y="39" width="86" height="52" rx="8" fill="#F4F0E9" stroke="${D}" stroke-width="2"/><text x="193" y="69" text-anchor="middle" font-size="11" fill="${F}">cluster</text><text x="193" y="28" text-anchor="middle" font-size="13" fill="${D}" font-family="Fraunces,serif">$4.3k<animate attributeName="opacity" values="1;.5;1" dur="1s" repeatCount="indefinite"/></text>`;
 return '';
}
document.getElementById('g').innerHTML = cards.map(c=>`
 <div class="card"><div class="top"><div><div class="tag">${c.tag}</div><div class="cat">${c.cat}</div></div>
 <span class="state"><span class="blip"></span> failing</span></div>
 <svg viewBox="0 0 360 130">${scene(c.kind)}</svg>
 <div class="desc">${c.desc}</div>
 <div class="bar"><div class="fill" style="width:92%"></div></div></div>`).join('');
</script></body></html>
