apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: cascade
  labels:
    app: user
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
        - name: user
          image: cascade/user:latest
          ports:
            - containerPort: 8082
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cascade-secrets
                  key: jwt-secret
          resources:
            requests: { cpu: "128m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
          livenessProbe:
            httpGet: { path: /health, port: 8082 }
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: cascade
spec:
  selector:
    app: user
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
