apiVersion: apps/v1
kind: Deployment
metadata:
  name: constraint-engine
  namespace: cascade
  labels:
    app: constraint-engine
spec:
  replicas: 3
  selector:
    matchLabels:
      app: constraint-engine
  template:
    metadata:
      labels:
        app: constraint-engine
    spec:
      containers:
        - name: engine
          image: cascade/constraint-engine:latest
          ports:
            - containerPort: 8094
          env:
            - name: LEARN_ENGINE_URL
              value: "http://learn-engine:8093"
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          livenessProbe:
            httpGet: { path: /health, port: 8094 }
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: constraint-engine
  namespace: cascade
spec:
  selector:
    app: constraint-engine
  ports:
    - port: 8094
      targetPort: 8094
  type: ClusterIP
