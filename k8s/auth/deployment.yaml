apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: cascade
  labels:
    app: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: cascade/auth:latest
          ports:
            - containerPort: 8081
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cascade-secrets
                  key: jwt-secret
          resources:
            requests: { cpu: "128m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
          livenessProbe:
            httpGet: { path: /health, port: 8081 }
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: cascade
spec:
  selector:
    app: auth
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
