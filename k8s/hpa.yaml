# HorizontalPodAutoscalers for the hot-path engines.
# Requires metrics-server installed in the cluster.
# Apply after the Deployments exist:  kubectl apply -f k8s/hpa.yaml
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cascade-engine
  namespace: cascade
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cascade-engine
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: constraint-engine
  namespace: cascade
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: constraint-engine
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: arena-engine
  namespace: cascade
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: arena-engine
  # Arena holds long-lived WebSocket connections; scale gently and never below 2.
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 75 }
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # avoid dropping pods with active duels too fast
