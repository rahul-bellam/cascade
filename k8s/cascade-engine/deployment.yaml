apiVersion: apps/v1
kind: Deployment
metadata:
  name: cascade-engine
  namespace: cascade
  labels:
    app: cascade-engine
spec:
  replicas: 4
  selector:
    matchLabels:
      app: cascade-engine
  template:
    metadata:
      labels:
        app: cascade-engine
    spec:
      containers:
        - name: engine
          image: cascade/cascade-engine:latest
          ports:
            - containerPort: 8090
          env:
            - name: LEARN_ENGINE_URL
              value: "http://learn-engine:8093"
            - name: INSIGHT_ENGINE_URL
              value: "http://insight-engine:8097"
          resources:
            requests: { cpu: "500m", memory: "512Mi" }
            limits: { cpu: "2", memory: "2Gi" }
          livenessProbe:
            httpGet: { path: /health, port: 8090 }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: 8090 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cascade-engine
  namespace: cascade
spec:
  selector:
    app: cascade-engine
  ports:
    - port: 8090
      targetPort: 8090
  type: ClusterIP
