apiVersion: apps/v1
kind: Deployment
metadata:
  name: learn-engine
  namespace: cascade
  labels:
    app: learn-engine
spec:
  replicas: 3
  selector:
    matchLabels:
      app: learn-engine
  template:
    metadata:
      labels:
        app: learn-engine
    spec:
      containers:
        - name: engine
          image: cascade/learn-engine:latest
          ports:
            - containerPort: 8093
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cascade-secrets
                  key: database-url
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          livenessProbe:
            httpGet: { path: /health, port: 8093 }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: 8093 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: learn-engine
  namespace: cascade
spec:
  selector:
    app: learn-engine
  ports:
    - port: 8093
      targetPort: 8093
  type: ClusterIP
